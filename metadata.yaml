# yaml-language-server: $schema=https://raw.githubusercontent.com/sgnl-actions/schemas/main/metadata.schema.json
name: aws-revoke-session
description: Revoke AWS sessions by applying a deny policy for tokens issued before a specific time

# Input parameters for web form generation
inputs:
  roleName:
    type: text
    description: The name of the IAM role to apply the session revocation policy to
    required: true
    validation:
      min: 1
      max: 64

  region:
    type: text
    description: AWS region (e.g., us-east-1)
    required: true
    validation:
      min: 1
      max: 30

  conditions:
    type: text
    description: Optional additional conditions to append to the revocation policy (JSON format)
    required: false

  tokenIssueTime:
    type: datetime
    description: Optional token issue time to revoke sessions before (defaults to current time)
    required: false

# Expected output structure
outputs:
  roleName:
    type: text
    description: The role name that was updated

  policyName:
    type: text
    description: The name of the policy that was applied

  tokenIssueTime:
    type: datetime
    description: The token issue time used for revocation

  applied:
    type: boolean
    description: Whether the policy was successfully applied

  appliedAt:
    type: datetime
    description: When the policy was applied (ISO 8601)

# Required secrets (configured at deployment time)
secrets:
  BASIC_USERNAME:
    type: text
    description: AWS access key ID (for direct auth)
    required: false
  BASIC_PASSWORD:
    type: text
    description: AWS secret access key (for direct auth)
    required: false
  OAUTH2_CLIENT_CREDENTIALS_CLIENT_SECRET:
    type: text
    description: OAuth2 client secret (for federated auth)
    required: false

environment:
  OAUTH2_CLIENT_CREDENTIALS_CLIENT_ID:
    type: text
    description: OAuth2 client credentials client ID
    required: false
  OAUTH2_CLIENT_CREDENTIALS_TOKEN_URL:
    type: text
    description: OAuth2 client credentials token URL
    required: false
  OAUTH2_CLIENT_CREDENTIALS_SCOPE:
    type: text
    description: OAuth2 client credentials scope
    required: false
  OAUTH2_CLIENT_CREDENTIALS_AUDIENCE:
    type: text
    description: OAuth2 client credentials audience
    required: false
  OAUTH2_CLIENT_CREDENTIALS_AUTH_STYLE:
    type: text
    description: OAuth2 client credentials auth style
    required: false
  AWS_ASSUME_ROLE_WEB_IDENTITY_REGION:
    type: text
    description: AWS region for STS AssumeRoleWithWebIdentity
    required: false
  AWS_ASSUME_ROLE_WEB_IDENTITY_ROLE_ARN:
    type: text
    description: ARN of the IAM role to assume
    required: false
  AWS_ASSUME_ROLE_WEB_IDENTITY_SESSION_NAME:
    type: text
    description: Session name for the assumed role
    required: false
  AWS_ASSUME_ROLE_WEB_IDENTITY_SESSION_DURATION_SECONDS:
    type: text
    description: Duration in seconds for the assumed role session
    required: false

requires_one_of:
  - ["secrets.BASIC_USERNAME", "secrets.BASIC_PASSWORD"]
  - [
      "secrets.OAUTH2_CLIENT_CREDENTIALS_CLIENT_SECRET",
      "environment.OAUTH2_CLIENT_CREDENTIALS_CLIENT_ID",
      "environment.OAUTH2_CLIENT_CREDENTIALS_TOKEN_URL",
      "environment.AWS_ASSUME_ROLE_WEB_IDENTITY_REGION",
      "environment.AWS_ASSUME_ROLE_WEB_IDENTITY_ROLE_ARN",
    ]

# Runtime configuration
runtime:
  type: nodejs-22
  timeout: 30s
  memory: 128Mi
